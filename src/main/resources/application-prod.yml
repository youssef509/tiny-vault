server:
  forward-headers-strategy: framework

spring:
  # Production profile: all sensitive values come from environment variables
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate            # never mutate schema in prod
    show-sql: false

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  
  storage:
    base-path: /var/storage         # Container mapped to Contabo VPS disk

  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}

  security:
    rate-limit:
      enabled: true
      requests-per-minute: 100

logging:
  level:
    com.youssef.storageservice: INFO
    org.springframework.security: WARN
  file:
    name: /var/log/storage-service/app.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 7
